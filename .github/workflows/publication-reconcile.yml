name: Reconcile immutable release publication state

on:
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publication-reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    name: read-only publication reconciliation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out the protected default branch without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install the exact read-only reconciliation tooling
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.txt
          python -m pip install --disable-pip-version-check --no-deps --no-build-isolation -e .
      - name: Fetch and normalize immutable release records
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate --slurp "/repos/$GITHUB_REPOSITORY/releases?per_page=100" \
            > "$RUNNER_TEMP/release-pages.json"
          python - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          pages = json.loads(Path(os.environ["RUNNER_TEMP"], "release-pages.json").read_text())
          def inspect_tag(tag):
              try:
                  tag_type = subprocess.check_output(
                      ["git", "cat-file", "-t", f"refs/tags/{tag}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
                  tag_object = subprocess.check_output(
                      ["git", "rev-parse", f"refs/tags/{tag}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
                  source = subprocess.check_output(
                      ["git", "rev-list", "-n", "1", f"refs/tags/{tag}"],
                      text=True,
                      stderr=subprocess.DEVNULL,
                  ).strip()
                  tag_api = json.loads(
                      subprocess.check_output(
                          [
                              "gh",
                              "api",
                              f"/repos/{os.environ['GITHUB_REPOSITORY']}/git/tags/{tag_object}",
                          ],
                          text=True,
                      )
                  ) if tag_type == "tag" else {}
              except subprocess.CalledProcessError:
                  tag_type = None
                  tag_object = None
                  source = None
                  tag_api = {}
              return {
                  "tag": tag,
                  "tagObjectSha": tag_object,
                  "sourceSha": source,
                  "annotated": tag_type == "tag",
                  "tagVerified": tag_api.get("verification", {}).get("verified", False),
              }

          tag_names = subprocess.check_output(
              ["git", "for-each-ref", "--format=%(refname:strip=2)", "refs/tags"],
              text=True,
          ).splitlines()
          tags = [inspect_tag(tag) for tag in sorted(tag_names) if "-v" in tag]
          tags_by_name = {item["tag"]: item for item in tags}
          releases = []
          for release in (item for page in pages for item in page):
              tag = release["tag_name"]
              tag_record = tags_by_name[tag] if tag in tags_by_name else inspect_tag(tag)
              releases.append(
                  {
                      "releaseId": release["id"],
                      "tag": tag,
                      "sourceSha": tag_record["sourceSha"],
                      "annotated": tag_record["annotated"],
                      "tagVerified": tag_record["tagVerified"],
                      "publishedAt": release["published_at"],
                      "draft": release["draft"],
                      "prerelease": release["prerelease"],
                      "immutable": release.get("immutable", False),
                  }
              )
          Path(os.environ["RUNNER_TEMP"], "normalized-releases.json").write_text(
              json.dumps(releases, indent=2) + "\n", encoding="utf-8"
          )
          Path(os.environ["RUNNER_TEMP"], "normalized-tags.json").write_text(
              json.dumps(tags, indent=2) + "\n", encoding="utf-8"
          )
          PY
      - name: Compare canonical manifests with GitHub releases
        id: comparison
        continue-on-error: true
        run: >-
          python -m skillpack_tools.publication reconcile
          --root .
          --releases "$RUNNER_TEMP/normalized-releases.json"
          --tags "$RUNNER_TEMP/normalized-tags.json"
          --output "$RUNNER_TEMP/publication-drift.json"
      - name: Preserve the reconciliation report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: publication-reconciliation-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/publication-drift.json
          if-no-files-found: error
          retention-days: 90
      - name: Summarize and enforce reconciliation
        if: ${{ always() }}
        env:
          COMPARISON_OUTCOME: ${{ steps.comparison.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '# Publication reconciliation'
            echo
            echo 'This job only observes GitHub releases and canonical manifests; it does not mutate either.'
            echo
            echo '```json'
            cat "$RUNNER_TEMP/publication-drift.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          test "$COMPARISON_OUTCOME" = success
