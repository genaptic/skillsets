name: Structural client compatibility

on:
  pull_request:
    paths:
      - "packs/**"
      - "dist/**"
      - ".claude-plugin/**"
      - ".agents/**"
      - "catalog.json"
      - "schemas/**"
      - "src/skillpack_tools/**"
      - "tools/**"
      - ".github/workflows/compatibility.yml"
      - "tests/test_path_safety.py"
      - "tests/test_tooling_hardening.py"
  push:
    branches:
      - "main"
    paths:
      - "packs/**"
      - "dist/**"
      - ".claude-plugin/**"
      - ".agents/**"
      - "catalog.json"
      - "schemas/**"
      - "src/skillpack_tools/**"
      - "tools/**"
      - ".github/workflows/compatibility.yml"
      - "tests/test_path_safety.py"
      - "tests/test_tooling_hardening.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: structural-compatibility-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  adapters-and-installers:
    name: adapters and installers (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2025
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install hash-locked validators and local CLI
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.txt
          python -m pip install --disable-pip-version-check --no-deps --no-build-isolation -e .
      - name: Validate current generated state and vendor structures
        run: |
          skillpacks generate --check
          skillpacks validate --check-generated --strict-placeholders
      - name: Run cross-platform filesystem safety fixtures
        run: python -m pytest tests/test_path_safety.py --no-cov
      - name: Run canonical pack discovery fixtures
        shell: python
        run: |
          import subprocess
          import sys
          from pathlib import Path

          smoke_tests = sorted(Path("packs").glob("*/*/tests/compatibility/smoke.py"))
          if not smoke_tests:
              raise SystemExit("no compatibility smoke tests found")
          for test in smoke_tests:
              print(f"==> {test}")
              subprocess.run([sys.executable, str(test)], check=True)
      - name: Dry-run Linux Bash installers
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          for script in dist/install/*.sh; do
            bash "$script" --dry-run
          done
      - name: Dry-run installers under macOS Bash 3.2
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          version=$(/bin/bash -c 'printf "%s.%s" "${BASH_VERSINFO[0]}" "${BASH_VERSINFO[1]}"')
          test "$version" = "3.2"
          for script in dist/install/*.sh; do
            /bin/bash "$script" --dry-run
          done
      - name: Dry-run Windows PowerShell installers
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $scripts = Get-ChildItem dist/install/*.ps1
          if (-not $scripts) { throw "No PowerShell installers found" }
          $scripts | ForEach-Object { & $_.FullName -DryRun }
      - name: Exercise PowerShell GitHub CLI capability preflights
        if: runner.os == 'Windows'
        run: >-
          python -m pytest tests/test_tooling_hardening.py
          -k powershell_installer_has_distinct_preflight_and_restores_environment_when_available
          --no-cov
      - name: Record the structural-only evidence boundary
        shell: python
        run: |
          import os
          from pathlib import Path

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text(
              "# Structural compatibility only\n\n"
              f"Generated adapters and installer dry runs passed on {os.environ['RUNNER_OS']}.\n\n"
              "This job does not install a native client, invoke a model, use credentials, "
              "or establish a client compatibility claim. Dated reports from the protected "
              "native-evidence workflow are required for releases.\n",
              encoding="utf-8",
          )
