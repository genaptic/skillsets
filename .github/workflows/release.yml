name: Release one skillpack

on:
  workflow_dispatch:
    inputs:
      pack_id:
        description: Exact lowercase pack ID to release.
        required: true
        type: string
      tag:
        description: Existing signed annotated tag, such as python-best-practices-v1.0.0.
        required: true
        type: string
      claude_evidence_run:
        description: Successful protected evidence-ingestion run ID for Claude Code.
        required: true
        type: string
      codex_evidence_run:
        description: Successful protected evidence-ingestion run ID for Codex.
        required: true
        type: string
      opencode_evidence_run:
        description: Successful protected evidence-ingestion run ID for OpenCode.
        required: true
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ inputs.pack_id }}
  cancel-in-progress: false

jobs:
  rust-assets:
    name: exact-tag Rust 1.85.0 asset contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    environment: release
    permissions:
      contents: read
    outputs:
      source_sha: ${{ steps.tested-source.outputs.sha }}
    steps:
      - name: Validate the requested tag before checkout
        env:
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_TAG: ${{ inputs.tag }}
        shell: python
        run: |
          import os
          import re

          pack = os.environ["REQUESTED_PACK"]
          tag = os.environ["REQUESTED_TAG"]
          if not re.fullmatch(r"[a-z0-9]+(?:-[a-z0-9]+)*", pack):
              raise SystemExit("pack_id must be a lowercase kebab-case identifier")
          semver = (
              r"(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)"
              r"(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?"
          )
          if not re.fullmatch(re.escape(pack) + r"-v" + semver, tag):
              raise SystemExit("tag must be the requested pack ID followed by a valid SemVer")
      - name: Check out the exact existing tag without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/tags/${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - name: Verify the annotated tag checkout before running repository code
        id: tested-source
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          tag_ref="refs/tags/$RELEASE_TAG"
          test "$(git cat-file -t "$tag_ref")" = "tag"
          head=$(git rev-parse HEAD)
          test "$(git rev-list -n 1 "$tag_ref")" = "$head"
          printf 'sha=%s\n' "$head" >> "$GITHUB_OUTPUT"
      - name: Verify GitHub's signed-tag attestation before running repository code
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          tag_object=$(git rev-parse "refs/tags/$RELEASE_TAG")
          verified=$(gh api "/repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq '.verification.verified')
          reason=$(gh api "/repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq '.verification.reason')
          if [[ "$verified" != "true" ]]; then
            echo "GitHub did not verify the Rust-tested tag signature: $reason" >&2
            exit 1
          fi
          echo "GitHub verified the Rust-tested annotated tag signature ($reason)."
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - name: Install the exact Rust 1.85.0 validation toolchain
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component rustfmt
          rustc +1.85.0 --version
          cargo +1.85.0 --version
          rustfmt +1.85.0 --version
      - name: Fetch only the Rust 1.85.0 locked harness dependencies
        env:
          RUSTUP_TOOLCHAIN: 1.85.0
        run: >-
          python tools/check-rust-assets --bootstrap
          --cargo-home "$RUNNER_TEMP/genaptic-rust-cargo-home"
      - name: Check Rust assets with Rust 1.85.0 and Cargo offline
        env:
          RUSTUP_TOOLCHAIN: 1.85.0
        run: >-
          python tools/check-rust-assets
          --cargo-home "$RUNNER_TEMP/genaptic-rust-cargo-home"
      - name: Verify the Rust check did not mutate source
        run: git diff --exit-code

  release:
    name: evidence-gated release
    needs: rust-assets
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    environment: release
    steps:
      - name: Validate dispatch identifiers before checkout
        env:
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_TAG: ${{ inputs.tag }}
          CLAUDE_RUN: ${{ inputs.claude_evidence_run }}
          CODEX_RUN: ${{ inputs.codex_evidence_run }}
          OPENCODE_RUN: ${{ inputs.opencode_evidence_run }}
        shell: python
        run: |
          import os
          import re

          pack = os.environ["REQUESTED_PACK"]
          tag = os.environ["REQUESTED_TAG"]
          if not re.fullmatch(r"[a-z0-9]+(?:-[a-z0-9]+)*", pack):
              raise SystemExit("pack_id must be a lowercase kebab-case identifier")
          semver = (
              r"(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)"
              r"(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?"
          )
          if not re.fullmatch(re.escape(pack) + r"-v" + semver, tag):
              raise SystemExit("tag must be the requested pack ID followed by a valid SemVer")
          for variable in ("CLAUDE_RUN", "CODEX_RUN", "OPENCODE_RUN"):
              if not re.fullmatch(r"[1-9][0-9]*", os.environ[variable]):
                  raise SystemExit(f"{variable} must be a positive GitHub Actions run ID")
      - name: Check out the exact existing tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.rust-assets.outputs.source_sha }}
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install hash-locked release tooling and local CLI
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r requirements-dev.txt
          python -m pip install --disable-pip-version-check --no-deps --no-build-isolation -e .
          skillpacks --help
      - name: Verify dynamic pack, exact SHA, and annotated tag
        id: metadata
        env:
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_TAG: ${{ inputs.tag }}
          RUST_TESTED_SHA: ${{ needs.rust-assets.outputs.source_sha }}
        shell: python
        run: |
          import os
          import subprocess
          from pathlib import Path

          from skillpack_tools.models import get_pack

          pack = get_pack(Path.cwd(), os.environ["REQUESTED_PACK"])
          requested_tag = os.environ["REQUESTED_TAG"]
          if requested_tag != pack.tag:
              raise SystemExit(f"requested tag {requested_tag!r} does not match {pack.tag!r}")
          tag_type = subprocess.check_output(
              ["git", "cat-file", "-t", f"refs/tags/{requested_tag}"], text=True
          ).strip()
          if tag_type != "tag":
              raise SystemExit(f"{requested_tag!r} must be an annotated tag object")
          head = subprocess.check_output(["git", "rev-parse", "HEAD"], text=True).strip()
          rust_tested = os.environ["RUST_TESTED_SHA"]
          if head != rust_tested:
              raise SystemExit(f"checkout {head} does not match Rust-tested SHA {rust_tested}")
          tagged = subprocess.check_output(
              ["git", "rev-list", "-n", "1", requested_tag], text=True
          ).strip()
          if tagged != head:
              raise SystemExit(f"tag resolves to {tagged}, but checkout is {head}")
          output = Path(os.environ["GITHUB_OUTPUT"])
          with output.open("a", encoding="utf-8") as handle:
              handle.write(f"tag={pack.tag}\n")
              handle.write(f"title={pack.display_name} {pack.version}\n")
              handle.write(f"archive=dist/releases/{pack.tag}.zip\n")
              handle.write(f"checksum=dist/releases/{pack.tag}.zip.sha256\n")
              handle.write(f"notes=dist/releases/{pack.tag}-release-notes.md\n")
              handle.write(f"source_sha={head}\n")
      - name: Verify GitHub's signed-tag attestation
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          tag_object=$(git rev-parse "refs/tags/$RELEASE_TAG")
          verified=$(gh api "/repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq '.verification.verified')
          reason=$(gh api "/repos/$GITHUB_REPOSITORY/git/tags/$tag_object" --jq '.verification.reason')
          if [[ "$verified" != "true" ]]; then
            echo "GitHub did not verify the tag signature: $reason" >&2
            exit 1
          fi
          echo "GitHub verified the annotated tag signature ($reason)."
      - name: Import maintainer signing keys for local tag verification
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          maintainer=$(python -c 'from pathlib import Path; from skillpack_tools.models import load_repository; print(load_repository(Path.cwd()).maintainer_github)')
          tag_payload=$(git cat-file -p "refs/tags/$RELEASE_TAG")
          if grep -q -- '-----BEGIN PGP SIGNATURE-----' <<< "$tag_payload"; then
            signing_home="$RUNNER_TEMP/genaptic-release-gnupg"
            key_bundle="$RUNNER_TEMP/genaptic-maintainer-signing-keys.asc"
            mkdir -p "$signing_home"
            chmod 700 "$signing_home"
            gh api --paginate "/users/$maintainer/gpg_keys" --jq '.[].raw_key' > "$key_bundle"
            test -s "$key_bundle"
            export GNUPGHOME="$signing_home"
            gpg --batch --import "$key_bundle"
            git verify-tag "$RELEASE_TAG"
            printf 'GNUPGHOME=%s\n' "$signing_home" >> "$GITHUB_ENV"
          elif grep -q -- '-----BEGIN SSH SIGNATURE-----' <<< "$tag_payload"; then
            allowed_signers="$RUNNER_TEMP/genaptic-maintainer-allowed-signers"
            gh api --paginate "/users/$maintainer/ssh_signing_keys" \
              --jq '.[] | "maintainer " + .key' > "$allowed_signers"
            test -s "$allowed_signers"
            git config --local gpg.format ssh
            git config --local gpg.ssh.allowedSignersFile "$allowed_signers"
            git verify-tag "$RELEASE_TAG"
          else
            echo "The tag does not contain a supported OpenPGP or SSH signature." >&2
            exit 1
          fi
      - name: Run immutable-source release gates
        run: |
          python tools/check-dependency-lock
          python -m ruff check .
          python -m ruff format --check .
          python tools/generate-all --check
          python tools/validate-repository --check-generated --strict-placeholders
          python tools/run-evals
          python -m pytest
      - name: Download the three protected exact-SHA evidence artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          PACK_ID: ${{ inputs.pack_id }}
          SOURCE_SHA: ${{ steps.metadata.outputs.source_sha }}
          CLAUDE_RUN: ${{ inputs.claude_evidence_run }}
          CODEX_RUN: ${{ inputs.codex_evidence_run }}
          OPENCODE_RUN: ${{ inputs.opencode_evidence_run }}
        shell: bash
        run: |
          set -euo pipefail
          reports_dir="$RUNNER_TEMP/compatibility-reports"
          mkdir -p "$reports_dir"
          for client in claude-code codex opencode; do
            case "$client" in
              claude-code) run_id="$CLAUDE_RUN" ;;
              codex) run_id="$CODEX_RUN" ;;
              opencode) run_id="$OPENCODE_RUN" ;;
            esac
            run_metadata=$(gh run view "$run_id" --repo "$GITHUB_REPOSITORY" \
              --json conclusion,event,headBranch,workflowName \
              --jq '[.conclusion,.event,.headBranch,.workflowName] | @tsv')
            expected_metadata=$'success\tworkflow_dispatch\tmain\tIngest native compatibility evidence'
            if [[ "$run_metadata" != "$expected_metadata" ]]; then
              echo "Evidence run $run_id has unexpected provenance: $run_metadata" >&2
              exit 1
            fi
            artifact="compatibility-report-$client-$PACK_ID-$SOURCE_SHA"
            gh run download "$run_id" --repo "$GITHUB_REPOSITORY" \
              --name "$artifact" --dir "$reports_dir/$client"
            test -f "$reports_dir/$client/$client.json"
          done
      - name: Build the deterministic evidence-gated release
        env:
          PACK_ID: ${{ inputs.pack_id }}
        shell: bash
        run: |
          set -euo pipefail
          reports_dir="$RUNNER_TEMP/compatibility-reports"
          python tools/release-pack "$PACK_ID" \
            --report "$reports_dir/claude-code/claude-code.json" \
            --report "$reports_dir/codex/codex.json" \
            --report "$reports_dir/opencode/opencode.json"
      - name: Verify the generated checksum
        env:
          CHECKSUM: ${{ steps.metadata.outputs.checksum }}
        shell: bash
        run: |
          set -euo pipefail
          checksum_directory=$(dirname "$CHECKSUM")
          checksum_file=$(basename "$CHECKSUM")
          cd "$checksum_directory"
          sha256sum --check "$checksum_file"
      - name: Publish the existing tag as a GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_TITLE: ${{ steps.metadata.outputs.title }}
          ARCHIVE: ${{ steps.metadata.outputs.archive }}
          CHECKSUM: ${{ steps.metadata.outputs.checksum }}
          NOTES: ${{ steps.metadata.outputs.notes }}
        shell: bash
        run: |
          set -euo pipefail
          reports_dir="$RUNNER_TEMP/compatibility-reports"
          gh release create "$RELEASE_TAG" \
            "$ARCHIVE" \
            "$CHECKSUM" \
            "$reports_dir/claude-code/claude-code.json" \
            "$reports_dir/codex/codex.json" \
            "$reports_dir/opencode/opencode.json" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "$RELEASE_TITLE" \
            --notes-file "$NOTES"
