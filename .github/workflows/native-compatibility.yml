name: Ingest native compatibility evidence

on:
  workflow_dispatch:
    inputs:
      client:
        description: Native client represented by the completed report.
        required: true
        type: choice
        options:
          - claude-code
          - codex
          - opencode
      pack_id:
        description: Exact pack ID evaluated by the native client and model.
        required: true
        type: string
      source_sha:
        description: Full 40-character release-candidate commit SHA that was evaluated.
        required: true
        type: string
      evidence_ref:
        description: Git ref containing the redacted machine-readable report.
        required: true
        default: "main"
        type: string
      report_path:
        description: Repository-relative JSON report path at evidence_ref.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: native-evidence-${{ inputs.client }}-${{ inputs.pack_id }}-${{ inputs.source_sha }}
  cancel-in-progress: false

jobs:
  validate-evidence:
    name: validate ${{ inputs.client }} evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: compatibility
    steps:
      - name: Validate the workflow dispatch source branch
        env:
          DEFAULT_BRANCH: main
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]]; then
            echo "Native evidence must be dispatched from refs/heads/$DEFAULT_BRANCH; received $GITHUB_REF." >&2
            exit 1
          fi
      - name: Validate dispatch identifiers before checkout
        env:
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_SHA: ${{ inputs.source_sha }}
          REPORT_PATH: ${{ inputs.report_path }}
        shell: python
        run: |
          import os
          import re
          from pathlib import PurePosixPath

          pack = os.environ["REQUESTED_PACK"]
          source_sha = os.environ["REQUESTED_SHA"]
          report_path = PurePosixPath(os.environ["REPORT_PATH"])
          if not re.fullmatch(r"[a-z0-9]+(?:-[a-z0-9]+)*", pack):
              raise SystemExit("pack_id must be a lowercase kebab-case identifier")
          if not re.fullmatch(r"[0-9a-f]{40}", source_sha):
              raise SystemExit("source_sha must be a lowercase full 40-character SHA")
          if report_path.is_absolute() or ".." in report_path.parts or report_path.suffix != ".json":
              raise SystemExit("report_path must be a safe repository-relative JSON path")
      - name: Check out the exact evaluated source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.source_sha }}
          path: source
          persist-credentials: false
      - name: Check out the redacted evidence
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.evidence_ref }}
          path: evidence
          persist-credentials: false
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: source/requirements-dev.txt
      - name: Install the hash-locked validation environment
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r source/requirements-dev.txt
          python -m pip install --disable-pip-version-check --no-deps --no-build-isolation -e source
      - name: Validate schema, exact provenance, inventory, cases, and verdict
        env:
          REQUESTED_CLIENT: ${{ inputs.client }}
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_SHA: ${{ inputs.source_sha }}
          REPORT_PATH: ${{ inputs.report_path }}
        shell: python
        run: |
          import datetime as dt
          import json
          import os
          import subprocess
          from pathlib import Path, PurePosixPath

          import yaml
          from jsonschema import Draft202012Validator, FormatChecker

          source = Path("source")
          requested_sha = os.environ["REQUESTED_SHA"]
          head = subprocess.check_output(
              ["git", "-C", str(source), "rev-parse", "HEAD"], text=True
          ).strip()
          if head != requested_sha:
              raise SystemExit(f"checked-out source {head} does not match {requested_sha}")

          relative_report = PurePosixPath(os.environ["REPORT_PATH"])
          evidence_root = Path("evidence").resolve()
          report_path = evidence_root.joinpath(*relative_report.parts).resolve()
          if not report_path.is_relative_to(evidence_root) or not report_path.is_file():
              raise SystemExit(f"report does not exist: {relative_report}")
          schema = json.loads(
              (source / "schemas/compatibility-report.schema.json").read_text(encoding="utf-8")
          )
          report = json.loads(report_path.read_text(encoding="utf-8"))
          errors = sorted(
              Draft202012Validator(schema, format_checker=FormatChecker()).iter_errors(report),
              key=lambda error: list(error.absolute_path),
          )
          if errors:
              details = "\n".join(f"- {list(error.absolute_path)}: {error.message}" for error in errors)
              raise SystemExit(f"compatibility report schema validation failed:\n{details}")

          requested_client = os.environ["REQUESTED_CLIENT"]
          requested_pack = os.environ["REQUESTED_PACK"]
          if report["client"]["name"] != requested_client:
              raise SystemExit("report client does not match the protected dispatch selection")
          if not report["client"]["model"]:
              raise SystemExit("release evidence must identify the model used")
          if report["pack"]["id"] != requested_pack:
              raise SystemExit("report pack does not match the protected dispatch selection")
          if report["pack"]["sourceSha"] != requested_sha:
              raise SystemExit("report sourceSha does not match the exact evaluated commit")

          manifests = []
          for path in source.glob("packs/*/*/skillpack.yaml"):
              data = yaml.safe_load(path.read_text(encoding="utf-8"))
              if data.get("id") == requested_pack:
                  manifests.append((path, data))
          if len(manifests) != 1:
              raise SystemExit(f"expected exactly one manifest for {requested_pack}, found {len(manifests)}")
          manifest_path, manifest = manifests[0]
          expected_tag = f"{requested_pack}-v{manifest['version']}"
          if report["pack"]["version"] != manifest["version"]:
              raise SystemExit(f"report version does not match {manifest_path}")
          if report["pack"]["tag"] != expected_tag:
              raise SystemExit(f"report tag must be {expected_tag}")
          if requested_client not in manifest["targets"]:
              raise SystemExit(f"{requested_client} is not a declared target for {requested_pack}")
          expected_skills = sorted(manifest["skills"])
          if sorted(report["pack"]["expectedSkills"]) != expected_skills:
              raise SystemExit("report expectedSkills does not match the canonical pack manifest")
          if sorted(report["installation"]["discoveredSkills"]) != expected_skills:
              raise SystemExit("native client did not discover the exact canonical skill inventory")

          all_cases = report["cases"]["routing"] + report["cases"]["behavior"]
          if any(not case["passed"] for case in all_cases):
              raise SystemExit("one or more native/model-backed cases failed")
          if report["verdict"]["status"] != "passed":
              raise SystemExit("report verdict is not passed")
          if report["reviewer"]["verdict"].strip().lower() not in {"pass", "passed", "approved"}:
              raise SystemExit("reviewer verdict is not an explicit pass")
          report_date = dt.date.fromisoformat(report["date"])
          if report_date > dt.date.today():
              raise SystemExit("report date cannot be in the future")

          output = Path("validated-report")
          output.mkdir()
          normalized = output / f"{requested_client}.json"
          normalized.write_text(json.dumps(report, indent=2) + "\n", encoding="utf-8")
          print(f"validated {normalized} for {requested_pack}@{requested_sha}")
      - name: Validate with the repository compatibility command
        env:
          REQUESTED_CLIENT: ${{ inputs.client }}
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_SHA: ${{ inputs.source_sha }}
        shell: bash
        run: |
          skillpacks --root source compatibility \
            "$GITHUB_WORKSPACE/validated-report/$REQUESTED_CLIENT.json" \
            --pack "$REQUESTED_PACK" \
            --source-sha "$REQUESTED_SHA"
      - name: Upload only the validated report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compatibility-report-${{ inputs.client }}-${{ inputs.pack_id }}-${{ inputs.source_sha }}
          path: validated-report/${{ inputs.client }}.json
          if-no-files-found: error
          retention-days: 90
      - name: State the evidence boundary
        env:
          REQUESTED_CLIENT: ${{ inputs.client }}
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_SHA: ${{ inputs.source_sha }}
        shell: python
        run: |
          import os
          from pathlib import Path

          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "# Protected compatibility evidence accepted\n\n"
              f"- Client: `{os.environ['REQUESTED_CLIENT']}`\n"
              f"- Pack: `{os.environ['REQUESTED_PACK']}`\n"
              f"- Evaluated source: `{os.environ['REQUESTED_SHA']}`\n\n"
              "This workflow validated and preserved a report produced by a real native-client "
              "and model-backed run. It did not infer compatibility from structural CI and did "
              "not itself run a model.\n",
              encoding="utf-8",
          )
