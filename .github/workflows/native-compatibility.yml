name: Ingest native compatibility evidence

on:
  workflow_dispatch:
    inputs:
      client:
        description: Native client represented by the completed report.
        required: true
        type: choice
        options:
          - claude-code
          - codex
          - opencode
      pack_id:
        description: Exact pack ID evaluated by the native client and model.
        required: true
        type: string
      source_sha:
        description: Full release-candidate commit SHA evaluated by the native client.
        required: true
        type: string
      evidence_sha:
        description: Full commit SHA containing the redacted report under compatibility/reports/.
        required: true
        type: string
      report_path:
        description: Repository-relative compatibility/reports/*.json path at evidence_sha.
        required: true
        type: string

permissions:
  contents: read
  attestations: write
  id-token: write

concurrency:
  group: native-evidence-${{ inputs.client }}-${{ inputs.pack_id }}-${{ inputs.source_sha }}
  cancel-in-progress: false

jobs:
  validate-evidence:
    name: validate ${{ inputs.client }} evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: compatibility
    steps:
      - name: Validate the workflow dispatch source branch
        env:
          DEFAULT_BRANCH: main
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/$DEFAULT_BRANCH" ]]; then
            echo "Native evidence must be dispatched from refs/heads/$DEFAULT_BRANCH; received $GITHUB_REF." >&2
            exit 1
          fi
          if [[ "${GITHUB_ACTOR,,}" != "${GITHUB_TRIGGERING_ACTOR,,}" ]]; then
            echo "A workflow rerun must be initiated by the original authorized actor." >&2
            exit 1
          fi
      - name: Validate dispatch identifiers before checkout
        env:
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_SHA: ${{ inputs.source_sha }}
          EVIDENCE_SHA: ${{ inputs.evidence_sha }}
          REPORT_PATH: ${{ inputs.report_path }}
        shell: python
        run: |
          import os
          import re
          from pathlib import PurePosixPath

          pack = os.environ["REQUESTED_PACK"]
          source_sha = os.environ["REQUESTED_SHA"]
          evidence_sha = os.environ["EVIDENCE_SHA"]
          raw_report_path = os.environ["REPORT_PATH"]
          report_path = PurePosixPath(raw_report_path)
          if not re.fullmatch(r"[a-z0-9]+(?:-[a-z0-9]+)*", pack):
              raise SystemExit("pack_id must be a lowercase kebab-case identifier")
          if not re.fullmatch(r"[0-9a-f]{40}", source_sha):
              raise SystemExit("source_sha must be a lowercase full 40-character SHA")
          if not re.fullmatch(r"[0-9a-f]{40}", evidence_sha):
              raise SystemExit("evidence_sha must be a lowercase full 40-character SHA")
          if (
              raw_report_path != report_path.as_posix()
              or report_path.is_absolute()
              or report_path.parts[:2] != ("compatibility", "reports")
              or any(part in {"", ".", ".."} for part in report_path.parts)
              or report_path.suffix != ".json"
              or re.fullmatch(
                  r"compatibility/reports/[A-Za-z0-9._/-]+\.json", raw_report_path
              ) is None
          ):
              raise SystemExit(
                  "report_path must be a safe compatibility/reports/*.json repository path"
              )
      - name: Check out the protected dispatch commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          path: control
          fetch-depth: 0
          persist-credentials: false
      - name: Prove ancestry and preserve the exact raw report blob
        env:
          DISPATCH_SHA: ${{ github.sha }}
          REQUESTED_SHA: ${{ inputs.source_sha }}
          EVIDENCE_SHA: ${{ inputs.evidence_sha }}
          REPORT_PATH: ${{ inputs.report_path }}
          REQUESTED_CLIENT: ${{ inputs.client }}
        shell: python
        run: |
          import os
          import subprocess
          from pathlib import Path

          def git(*arguments: str, capture: bool = False) -> bytes:
              completed = subprocess.run(
                  ["git", "-C", "control", *arguments],
                  check=False,
                  stdout=subprocess.PIPE if capture else None,
                  stderr=subprocess.PIPE,
              )
              if completed.returncode:
                  detail = completed.stderr.decode(errors="replace").strip()
                  raise SystemExit(
                      f"git {' '.join(arguments)} failed provenance validation: {detail}"
                  )
              return completed.stdout or b""

          dispatch_sha = os.environ["DISPATCH_SHA"]
          source_sha = os.environ["REQUESTED_SHA"]
          evidence_sha = os.environ["EVIDENCE_SHA"]
          head = git("rev-parse", "HEAD", capture=True).decode().strip()
          if head != dispatch_sha:
              raise SystemExit(f"protected checkout {head} does not match {dispatch_sha}")
          git("cat-file", "-e", f"{source_sha}^{{commit}}")
          git("cat-file", "-e", f"{evidence_sha}^{{commit}}")
          git("merge-base", "--is-ancestor", evidence_sha, dispatch_sha)
          git("merge-base", "--is-ancestor", source_sha, evidence_sha)
          git("worktree", "add", "--detach", "../evaluated-source", source_sha)

          blob = git("show", f"{evidence_sha}:{os.environ['REPORT_PATH']}", capture=True)
          output = Path("validated-report")
          output.mkdir()
          report = output / f"{os.environ['REQUESTED_CLIENT']}.json"
          report.write_bytes(blob)
          print(f"preserved {len(blob)} raw bytes as {report}")
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: control/requirements-dev.txt
      - name: Install the hash-locked validation environment
        run: |
          python -m pip install --disable-pip-version-check --require-hashes -r control/requirements-dev.txt
          python -m pip install --disable-pip-version-check --no-deps --no-build-isolation -e control
      - name: Validate schema, inventory, complete cases, freshness, and policy
        env:
          REQUESTED_CLIENT: ${{ inputs.client }}
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_SHA: ${{ inputs.source_sha }}
          ACTOR_ID: ${{ github.actor_id }}
        shell: python
        run: |
          import os
          from pathlib import Path

          from skillpack_tools.models import get_pack, load_repository
          from skillpack_tools.validate import validate_compatibility_report

          source = Path("evaluated-source")
          client = os.environ["REQUESTED_CLIENT"]
          errors, _ = validate_compatibility_report(
              source,
              Path("validated-report") / f"{client}.json",
              pack=get_pack(source, os.environ["REQUESTED_PACK"]),
              source_sha=os.environ["REQUESTED_SHA"],
              policy=load_repository(Path("control")).compatibility_evidence,
              schema_root=Path("control"),
              actor=os.environ["GITHUB_ACTOR"],
              actor_id=int(os.environ["ACTOR_ID"]),
              triggering_actor=os.environ["GITHUB_TRIGGERING_ACTOR"],
          )
          if errors:
              raise SystemExit("compatibility report validation failed:\n" + "\n".join(errors))
      - name: Bind the authorized actor and create the provenance envelope
        env:
          REQUESTED_CLIENT: ${{ inputs.client }}
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_SHA: ${{ inputs.source_sha }}
          EVIDENCE_SHA: ${{ inputs.evidence_sha }}
          REPORT_PATH: ${{ inputs.report_path }}
          REPOSITORY_ID: ${{ github.repository_id }}
          WORKFLOW_REF: ${{ github.workflow_ref }}
          WORKFLOW_SHA: ${{ github.workflow_sha }}
          ACTOR_ID: ${{ github.actor_id }}
        shell: python
        run: |
          import json
          import os
          from pathlib import Path

          from skillpack_tools.evidence import (
              build_evidence_envelope,
              reviewer_authorization_errors,
              sha256_file,
              strict_load_json,
              validate_evidence_envelope,
          )
          from skillpack_tools.models import get_pack, load_repository

          client = os.environ["REQUESTED_CLIENT"]
          report_path = Path("validated-report") / f"{client}.json"
          report = strict_load_json(report_path)
          config = load_repository(Path("control"))
          pack = get_pack(Path("evaluated-source"), os.environ["REQUESTED_PACK"])
          identity_errors = reviewer_authorization_errors(
              report["reviewer"],
              config.compatibility_evidence,
              actor=os.environ["GITHUB_ACTOR"],
              actor_id=int(os.environ["ACTOR_ID"]),
              triggering_actor=os.environ["GITHUB_TRIGGERING_ACTOR"],
              pack_maintainers=[item["github"] for item in pack.maintainers],
              label=str(report_path),
          )
          if identity_errors:
              raise SystemExit("\n".join(identity_errors))

          envelope = build_evidence_envelope(
              repository_id=int(os.environ["REPOSITORY_ID"]),
              repository_slug=os.environ["GITHUB_REPOSITORY"],
              run_id=int(os.environ["GITHUB_RUN_ID"]),
              run_attempt=int(os.environ["GITHUB_RUN_ATTEMPT"]),
              workflow_ref=os.environ["WORKFLOW_REF"],
              workflow_sha=os.environ["WORKFLOW_SHA"],
              event=os.environ["GITHUB_EVENT_NAME"],
              actor=os.environ["GITHUB_ACTOR"],
              actor_id=int(os.environ["ACTOR_ID"]),
              triggering_actor=os.environ["GITHUB_TRIGGERING_ACTOR"],
              source_sha=os.environ["REQUESTED_SHA"],
              evidence_sha=os.environ["EVIDENCE_SHA"],
              report_repository_path=os.environ["REPORT_PATH"],
              report_sha256=sha256_file(report_path),
              client=client,
              pack_id=os.environ["REQUESTED_PACK"],
              tested_at=report["testedAt"],
          )
          envelope_path = report_path.with_name(f"{client}.envelope.json")
          envelope_path.write_text(json.dumps(envelope, indent=2) + "\n", encoding="utf-8")
          errors, _ = validate_evidence_envelope(
              Path("control"),
              envelope_path,
              report_path=report_path,
              report_repository_path=os.environ["REPORT_PATH"],
              source_sha=os.environ["REQUESTED_SHA"],
              evidence_sha=os.environ["EVIDENCE_SHA"],
              client=client,
              pack_id=os.environ["REQUESTED_PACK"],
              repository_slug=os.environ["GITHUB_REPOSITORY"],
              workflow_run_id=int(os.environ["GITHUB_RUN_ID"]),
          )
          if errors:
              raise SystemExit("evidence envelope validation failed:\n" + "\n".join(errors))
      - name: Attest the raw report and workflow-controlled envelope
        id: provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-path: |
            validated-report/${{ inputs.client }}.json
            validated-report/${{ inputs.client }}.envelope.json
      - name: Preserve and immediately verify the attestation bundle
        env:
          REQUESTED_CLIENT: ${{ inputs.client }}
          ATTESTATION_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          GH_TOKEN: ${{ github.token }}
          SIGNER_WORKFLOW: ${{ github.repository }}/.github/workflows/native-compatibility.yml
          DEFAULT_BRANCH: main
        shell: bash
        run: |
          set -euo pipefail
          destination="validated-report/$REQUESTED_CLIENT.attestation.jsonl"
          cp "$ATTESTATION_BUNDLE" "$destination"
          test -s "$destination"
          for subject in \
            "validated-report/$REQUESTED_CLIENT.json" \
            "validated-report/$REQUESTED_CLIENT.envelope.json"; do
            gh attestation verify "$subject" \
              --repo "$GITHUB_REPOSITORY" \
              --bundle "$destination" \
              --signer-workflow "$SIGNER_WORKFLOW" \
              --source-ref "refs/heads/$DEFAULT_BRANCH" \
              --deny-self-hosted-runners
          done
      - name: Upload the report, envelope, and attestation bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compatibility-report-${{ inputs.client }}-${{ inputs.pack_id }}-${{ inputs.source_sha }}
          path: |
            validated-report/${{ inputs.client }}.json
            validated-report/${{ inputs.client }}.envelope.json
            validated-report/${{ inputs.client }}.attestation.jsonl
          if-no-files-found: error
          retention-days: 90
      - name: State the evidence boundary
        env:
          REQUESTED_CLIENT: ${{ inputs.client }}
          REQUESTED_PACK: ${{ inputs.pack_id }}
          REQUESTED_SHA: ${{ inputs.source_sha }}
          EVIDENCE_SHA: ${{ inputs.evidence_sha }}
        shell: python
        run: |
          import os
          from pathlib import Path

          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(
              "# Protected compatibility evidence accepted\n\n"
              f"- Client: `{os.environ['REQUESTED_CLIENT']}`\n"
              f"- Pack: `{os.environ['REQUESTED_PACK']}`\n"
              f"- Evaluated source: `{os.environ['REQUESTED_SHA']}`\n"
              f"- Evidence commit: `{os.environ['EVIDENCE_SHA']}`\n\n"
              "The artifact preserves the raw report, a workflow-controlled provenance "
              "envelope, and their GitHub Actions attestation bundle. It did not infer "
              "compatibility from structural CI and did not itself run a model.\n",
              encoding="utf-8",
          )
