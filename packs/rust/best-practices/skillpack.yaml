schema-version: 2
id: "rust-best-practices"
display-name: "Rust Best Practices"
description: "Repository-aware workflows for designing, reviewing, testing, documenting, and maintaining production Rust systems."
language: "rust"
subject: "best-practices"
version: "1.0.0"
maturity: "release-candidate"
distribution:
  visibility: "public"
publication:
  state: "unpublished"
release-gates:
- "native-evidence"
- "deterministic-archive"
- "rust-assets"
interface:
  short-description: "Design, review, and maintain repository-aware Rust systems."
  starter-prompts:
  - skill: "rust-core-best-practices"
    prompt: "Use $rust-core-best-practices to review this Rust change against repository policy and current core practices."
  - skill: "rust-project-architecture"
    prompt: "Use $rust-project-architecture to design or review this Rust project's crate, module, and workspace boundaries."
  - skill: "rust-testing-strategy"
    prompt: "Use $rust-testing-strategy to plan reliable unit, integration, doctest, CLI, and end-to-end coverage."
  - skill: "rust-networking"
    prompt: "Use $rust-networking to design or review safe Rust clients, retries, timeouts, and pools."
license: Apache-2.0
maintainers:
- github: "jecsand838"
skills:
- "rust-core-best-practices"
- "rust-project-architecture"
- "rust-code-structure"
- "rust-abstraction-design"
- "rust-async-concurrency"
- "rust-networking"
- "rust-testing-strategy"
- "rust-dependency-portability"
- "rust-workspace-documentation"
- "rustdoc-maintenance"
targets:
- "claude-code"
- "codex"
- "opencode"
category: "Developer Tools"
keywords:
- "agent-skills"
- "rust"
- "cargo"
- "architecture"
- "async"
- "testing"
- "networking"
- "portability"
compatibility:
  runtimes:
    cargo: "bundled with the target repository's selected Rust toolchain"
    rust: "target repository toolchain and MSRV; Edition 2024 examples require >=1.85"
  notes: "Guidance honors repository-declared editions, features, lockfiles, targets, and CI. Crate-specific APIs must be checked against locked versions."
operations:
  network: "optional"
  filesystem: "project-write"
  command-execution: "optional-explicit"
  external-writes: "none"
