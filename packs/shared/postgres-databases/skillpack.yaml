schema-version: 2
id: postgres-databases
display-name: PostgreSQL Databases
description: Schema, query, index, migration, and recovery workflows for safe, evidence-based PostgreSQL engineering.
language: shared
subject: postgres-databases
version: 1.0.0
maturity: release-candidate
distribution:
  visibility: public
publication:
  state: unpublished
release-gates:
- native-evidence
- deterministic-archive
interface:
  short-description: Design and review safe, evidence-backed PostgreSQL changes.
  starter-prompts:
  - skill: postgres-schema-design
    prompt: Use $postgres-schema-design to design a PostgreSQL schema from these domain invariants and workloads.
  - skill: postgres-query-performance-review
    prompt: Use $postgres-query-performance-review to diagnose this PostgreSQL query from the available plan evidence.
  - skill: postgres-migration-safety
    prompt: Use $postgres-migration-safety to turn this PostgreSQL change into a safe production rollout plan.
  - skill: postgres-backup-recovery
    prompt: Use $postgres-backup-recovery to assess this PostgreSQL recovery design against its RPO and RTO.
license: Apache-2.0
maintainers:
- github: jecsand838
skills:
- postgres-schema-design
- postgres-schema-review
- postgres-query-performance-review
- postgres-index-design
- postgres-migration-safety
- postgres-backup-recovery
targets:
- claude-code
- codex
- opencode
category: Data & Databases
keywords:
- agent-skills
- postgresql
- schema
- performance
- migrations
- recovery
compatibility:
  runtimes:
    python: '>=3.11 for optional helpers'
    postgresql: "12\u201318; references target 18"
  notes: Confirm syntax, lock behavior, extensions, and managed-service restrictions against the deployed PostgreSQL major version and provider.
operations:
  network: optional
  filesystem: explicit-output
  command-execution: optional-explicit
  external-writes: optional-explicit
