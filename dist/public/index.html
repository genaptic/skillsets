<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Genaptic Skillsets</title>
    <style>
      :root { color-scheme: light dark; font-family: system-ui, sans-serif; }
      body { margin: 0; }
      main { margin: 0 auto; max-width: 72rem; padding: 2rem 1rem 4rem; }
      header { border-bottom: 1px solid currentColor; margin-bottom: 2rem; }
      .repository { font-family: ui-monospace, monospace; }
      .packs { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(18rem, 1fr)); }
      .pack { border: 1px solid currentColor; border-radius: .5rem; padding: 1rem; }
      .pack h3 { margin-top: 0; }
      dl div { display: grid; grid-template-columns: 7rem 1fr; }
      dd { margin: 0; }
      .targets { display: flex; flex-wrap: wrap; gap: .75rem; padding-left: 1.25rem; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <p class="repository">genaptic/skillsets</p>
        <h1>Genaptic Skillsets</h1>
        <p>Portable, versioned Agent Skill packs for Claude Code, Codex, and OpenCode.</p>
        <p>Marketplace: <code>genaptic-skillsets</code></p>
      </header>
      <section aria-labelledby="skillpacks-heading">
        <h2 id="skillpacks-heading">Skillpacks</h2>
        <p><strong>No stable releases are currently published.</strong></p>
      </section>
    </main>
  </body>
</html>
