# Example only. Confirm backend versions and metadata against current PyPA guidance.
[build-system]
requires = ["setuptools>=77"]
build-backend = "setuptools.build_meta"

[project]
name = "example-distribution"
version = "0.1.0"
description = "Replace with a concise package description."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Example Maintainer" }]
dependencies = []

[project.optional-dependencies]
test = [
  "pytest>=9,<10",
]

[project.scripts]
example-command = "example_package.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-config --strict-markers"
